<ng-container *ngIf="traineesState$ | async; let traineesState">
  <app-data-table
    [dataTableConfig]="tableConfig"
    [items]="traineesState.traineesRows"
    [isLoading]="traineesState.isLoading"
    [filtersForm]="dataFiltersForm"
    (tableRowClicked)="onTableRowClick($event)"
  >
    <div class="search-container row">
      <app-text-input
        [placeholder]="'ID'"
        [formControl]="formUtilitiesService.getControl(dataFiltersForm, 'id')"
        [name]="'id'"
      />
      <app-text-input
        [placeholder]="'Grade'"
        [type]="'number'"
        [formControl]="formUtilitiesService.getControl(dataFiltersForm, 'grade')"
        [name]="'grade'"
      />
      <app-select-input
        [options]="gradeRangeOptions"
        [placeholder]="'Grade range'"
        [formControl]="formUtilitiesService.getControl(dataFiltersForm, 'gradeRange')"
        [name]="'gradeRange'"
        [isEmptyOption]="true"
      />
      <app-date-input
        [placeholder]="'Start Date'"
        [formControl]="formUtilitiesService.getControl(dataFiltersForm, 'startDate')"
        [name]="'startDate'"
      />
      <app-date-input
        [placeholder]="'End Date'"
        [formControl]="formUtilitiesService.getControl(dataFiltersForm, 'endDate')"
        [name]="'endDate'"
      />
      <app-button
        [text]="'Reset filters'"
        [color]="'primary'"
        (buttonClicked)="resetFilters()"
      />
    </div>
  </app-data-table>
</ng-container>
