<ng-container *ngIf="control">
  <section>
    <mat-label>{{ placeholder }}</mat-label>
    <mat-checkbox [formControl]="control" class="example-margin">{{ option.key }}
    </mat-checkbox>
  </section>
  <app-error-input *ngIf="formName"
                   [formContained]="control"
                   [controlName]="name"
                   [formName]="formName"
  ></app-error-input>
</ng-container>
