<ng-container *ngIf="control">
  <section>
    <mat-label>{{ label }}</mat-label>
    <mat-checkbox [formControl]="control">{{ option }}
    </mat-checkbox>
  </section>
  <app-error-input *ngIf="formName"
                   [formContained]="control"
                   [controlName]="name"
                   [formName]="formName"
  ></app-error-input>
</ng-container>
