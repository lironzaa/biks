@if (control) {
  <section>
    <mat-label>{{ label }}</mat-label>
    <mat-checkbox [formControl]="control">{{ option }}
    </mat-checkbox>
  </section>
  @if (formName) {
    <app-error-input
      [formContained]="control"
      [controlName]="name"
      [formName]="formName"
    ></app-error-input>
  }
}
