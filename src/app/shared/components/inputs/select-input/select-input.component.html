@if (control) {
  <mat-form-field [ngClass]="{'w-100': isFullWidth}">
    <mat-label>{{ placeholder }}</mat-label>
    <mat-select [formControl]="control" [multiple]="isMultiple">
      @if (isEmptyOption) {
        <mat-option>None</mat-option>
      }
      @for (option of options; track option) {
        <mat-option [value]="option">{{ option }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  @if (formName) {
    <app-error-input
      [formContained]="control"
      [controlName]="name"
      [formName]="formName"
      [customErrorMessages]="customErrorMessages"
    ></app-error-input>
  }
}
