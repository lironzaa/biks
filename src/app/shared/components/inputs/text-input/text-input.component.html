@if (control) {
  <mat-form-field [ngClass]="{'w-100': isFullWidth}">
    <mat-label>{{ placeholder }}</mat-label>
    <input [formControl]="control" [attr.value]="value || null" [type]="type" matInput>
  </mat-form-field>
  @if (formName) {
    <app-error-input
      [formContained]="control"
      [controlName]="name"
      [formName]="formName"
      [customErrorMessages]="customErrorMessages"
    ></app-error-input>
  }
}
