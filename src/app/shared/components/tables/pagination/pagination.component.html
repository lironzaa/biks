@if (paginationData$ | async; as paginationData) {
  <div class="pagination-container">
    <div class="pagination-buttons">
      <app-button
        [text]="'First page'"
        [color]="'primary'"
        [isDisabled]="!paginationData.hasPreviousPage"
        (buttonClicked)="navigateToPage('firstPage')"
      />
      <app-button
        [text]="'Previous'"
        [color]="'primary'"
        [isDisabled]="!paginationData.hasPreviousPage"
        (buttonClicked)="navigateToPage('previousPage')"
      />
      <div class="current-page-div">
        <span>page {{ currentPage }} of {{ totalPages }}</span>
      </div>
      <app-button
        [text]="'Next'"
        [color]="'primary'"
        [isDisabled]="!paginationData.hasNextPage"
        (buttonClicked)="navigateToPage('nextPage')"
      />
      <app-button
        [text]="'Last page'"
        [color]="'primary'"
        [isDisabled]="!paginationData.hasNextPage"
        (buttonClicked)="navigateToPage('lastPage')"
      />
    </div>
    <div class="results-container">
      <div>
      <span>Showing <span>{{ paginationData.from }}-{{ paginationData.to }}</span>
      of {{ paginationData.itemsCount }} results</span>
      </div>
      <app-select-input
        [options]="paginationOptions"
        [placeholder]="'Items Per Page'"
        [formControl]="formUtilitiesService.getControl(paginationForm, 'itemsPerPage')"
        [name]="'itemsPerPage'"
      />
    </div>
  </div>
}
